{% extends "base.html" %}
{% block content %}

<h2>Tracking Order #{{ order.id }}</h2>
<p>Status: <strong>{{ order.status }}</strong></p>

{% set steps = ['Placed', 'Packed', 'Shipped', 'Delivered'] %}
<ul>
{% for step in steps %}
    <li {% if steps.index(step) <= steps.index(order.status) %}style="color:green"{% endif %}>
        {{ step }}
    </li>
{% endfor %}
</ul>

<a href="{{ url_for('orders') }}">← Back to Orders</a>

{% endblock %}
