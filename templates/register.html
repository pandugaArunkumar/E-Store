{% extends 'base.html' %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">
        <h3>Create Account</h3>

        <form method="POST">
            <input class="form-control mb-3" name="name" placeholder="Full Name" required>
            <input class="form-control mb-3" type="email" name="email" placeholder="Email address" required>
            <input class="form-control mb-4" type="password" name="password" placeholder="Password" required>

            <button class="btn btn-primary w-100">Register</button>
        </form>
    </div>
</div>

{% endblock %}
