{% extends 'base.html' %}
{% block content %}

<!-- HERO SECTION -->
<section class="hero-section">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-6">
                <h5 class="text-primary">60% Discount</h5>
                <h1 class="fw-bold">Winter Collection</h1>
                <p>Best Cloth Collection By 2026</p>
                <a href="{{ url_for('products') }}" class="btn btn-primary btn-lg">
                    Shop Now
                </a>
            </div>

            <div class="col-md-6 text-center">
                <img src="{{ url_for('static', filename='images/hero1.webp') }}"
                     class="img-fluid hero-img">
            </div>
        </div>
    </div>
</section>
<!-- CATEGORY SECTION -->
<!-- CATEGORY SECTION -->
<section class="py-5">
    <div class="container text-center">
        <h2 class="fw-bold mb-4">Shop by Category</h2>

        <div class="row g-4">

            <!-- WOMEN -->
            <div class="col-md-4">
                <a href="{{ url_for('products', category='Women') }}"
                   class="text-decoration-none text-dark d-block">
                    <div class="category-card">
                        <img src="{{ url_for('static', filename='images/women.jpg') }}"
                             class="img-fluid rounded">
                        <h4 class="mt-3">Women's Cloth</h4>
                    </div>
                </a>
            </div>

            <!-- WINTER -->
            <div class="col-md-4">
                <a href="{{ url_for('products', season='Winter') }}"
                   class="text-decoration-none text-dark d-block">
                    <div class="category-card">
                        <img src="{{ url_for('static', filename='images/winter.avif') }}"
                             class="img-fluid rounded">
                        <h4 class="mt-3">Winter Collection</h4>
                    </div>
                </a>
            </div>

            <!-- MEN -->
            <div class="col-md-4">
                <a href="{{ url_for('products', category='Men') }}"
                   class="text-decoration-none text-dark d-block">
                    <div class="category-card">
                        <img src="{{ url_for('static', filename='images/men.jpg') }}"
                             class="img-fluid rounded">
                        <h4 class="mt-3">Men's Cloth</h4>
                    </div>
                </a>
            </div>

        </div>
    </div>
</section>


{% endblock %}
