<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h3>Admin Dashboard</h3>

<form method="POST" action="/admin/add-product" class="mb-4">
    <input name="name" class="form-control mb-2" placeholder="Product Name">
    <input name="price" class="form-control mb-2" placeholder="Price">
    <input name="category" class="form-control mb-2" placeholder="Category">
    <textarea name="description" class="form-control mb-2"></textarea>
    <button class="btn btn-success">Add Product</button>
</form>

<table class="table table-bordered">
<tr>
    <th>Name</th><th>Price</th><th>Action</th>
</tr>
{% for p in products %}
<tr>
    <td>{{ p.name }}</td>
    <td>{{ p.price }}</td>
    <td>
        <a href="/admin/delete/{{ p.id }}" class="btn btn-danger btn-sm">Delete</a>
    </td>
</tr>
{% endfor %}
</table>

</body>
</html>
